<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SBP-Net Interactive Demo</title>
  <style>
    :root { --bg: #0b0e14; --panel: rgba(18, 22, 32, 0.85); --fg: #e6e9ef; --accent: #6ea8ff; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg); color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #gl { display: block; width: 100vw; height: 100vh; cursor: crosshair; }

    #hud { position: fixed; top: 12px; left: 12px; padding: 12px 14px; background: var(--panel);
      border: 1px solid #2a3145; border-radius: 10px; backdrop-filter: blur(6px); max-width: 320px;
      font-size: 13px; line-height: 1.5; user-select: none; }
    #hud h1 { margin: 0 0 6px; font-size: 15px; font-weight: 600; }
    #hud .meta { color: #9aa4bb; font-size: 12px; }
    #hud .legend { display: flex; gap: 14px; margin-top: 8px; }
    #hud .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .dot.orig { background: #7f8a9e; } .dot.recon { background: #43d17a; } .dot.hi { background: #ffcf4d; }

    #controls { position: fixed; top: 12px; right: 12px; padding: 12px 14px; background: var(--panel);
      border: 1px solid #2a3145; border-radius: 10px; backdrop-filter: blur(6px); font-size: 13px;
      display: flex; flex-direction: column; gap: 10px; width: 220px; user-select: none; }
    #controls label { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    #controls input[type=range] { flex: 1; }
    #controls .row { display: flex; gap: 8px; }
    button { flex: 1; cursor: pointer; background: #1b2233; color: var(--fg); border: 1px solid #33405c;
      padding: 8px 10px; border-radius: 8px; font-size: 13px; }
    button:hover { background: #232c42; } button:active { background: #2c3654; }
    button.toggled { background: #2b3d63; border-color: var(--accent); }

    #status { position: fixed; bottom: 12px; left: 12px; padding: 8px 12px; background: var(--panel);
      border: 1px solid #2a3145; border-radius: 8px; font-size: 12px; color: #9aa4bb; }

    #loader { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(5, 7, 12, 0.55); backdrop-filter: blur(2px); z-index: 20; cursor: wait; }
    #loader.on { display: flex; }
    #loader .box { display: flex; flex-direction: column; align-items: center; gap: 14px;
      padding: 22px 28px; background: var(--panel); border: 1px solid #33405c; border-radius: 12px; }
    .spinner { width: 34px; height: 34px; border: 3px solid #33405c; border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <canvas id="gl"></canvas>

  <div id="hud">
    <h1>SBP-Net &mdash; Interactive Reconstruction</h1>
    <div class="meta" id="meta">loading volume&hellip;</div>
    <div class="legend">
      <span><i class="dot orig"></i> input</span>
      <span><i class="dot recon"></i> reconstructed</span>
      <span><i class="dot hi"></i> last</span>
    </div>
    <div class="meta" style="margin-top:8px">
      Drag: orbit &nbsp;&middot;&nbsp; Wheel: zoom &nbsp;&middot;&nbsp; Right/Shift-drag: pan<br/>
      <b>Click a point</b> to reconstruct a cube around it.
    </div>
  </div>

  <div id="controls">
    <label>Point size <input id="pointSize" type="range" min="1" max="12" step="0.5" value="4" /></label>
    <label><span>Show reconstructed</span><input id="toggleRecon" type="checkbox" checked /></label>
    <div class="row">
      <button id="resetBtn">Reset</button>
      <button id="fitBtn">Recenter</button>
    </div>
  </div>

  <div id="status">ready</div>

  <div id="loader"><div class="box"><div class="spinner"></div><div>Reconstructing&hellip;</div></div></div>

  <script src="/static/main.js"></script>
</body>
</html>
